name: ci-watchdog

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Ensure CI script is executable
        run: chmod +x scripts/ci-check.sh scripts/verify-docs-rust.sh scripts/verify-docs.sh

      - name: Run quality suite (monitor)
        run: bash scripts/ci-check.sh
